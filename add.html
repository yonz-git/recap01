<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="./css/styles.css" />
        <link rel="stylesheet" href="./css/form.css" />

    <script src="js/index.js" defer></script>
    <script src="js/showanswer.js" defer></script>
    <script src="js/darkmode.js" defer></script>
     <script src="js/navbar.js" defer></script>

    <title>Document</title>

  <body class="pageAdd">
    <header>
      <nav class="site-nav">
        <p class="main-title" aria-labelledby="title">Create new Cards</p>
      </nav>
    </header>


    <main id="formContent" class="formContent">
      <section class="newCardContainer questionBoxContainer">

        <article class="newCard" >
          
          <form data-js="form">
    <label id="label" for="question">Your Question:</label>
    <textarea id="question" name="question" rows="3" required></textarea>
    <!-- <p class="characters">16 characters left</p> -->

    <label id="label" for="answer">The Answer:</label>
    <textarea id="answer" name="answer" rows="3" required></textarea>

 <!-- <p class="characters">150 characters left</p> -->
    <label id="label" for="tag">Hashtag:</label>
    <input type="text" id="tag" name="tag" placeholder="#css" required />

    <button type="submit" class="btnSubmit" data-js="submit">Create Question</button>
  </form>

          
</article>
     
       
  </form> 
</section>
 
    </main>

<footer class="navBarContainer frosted" data-js="footerContainer"></footer>

  </body>
