<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="stylesheet" href="./css/form.css" />

    <script src="js/index.js" defer></script>
    <script src="js/showanswer.js" defer></script>
    <script src="js/darkmode.js" defer></script>
    <script src="js/navbar.js" defer></script>
    <script src="js/form.js" defer></script>

    <title>Document</title>
  </head>
  <body class="pageForm">
    <header>
      <nav class="site-nav">
        <p class="main-title" aria-labelledby="title">Create new Quiz</p>
      </nav>
    </header>

    <main id="formContent" class="formContent">
      <section class="formNewCard">
        <form data-js="form">
          <label for="question">Your Question:</label>
          <textarea id="question" name="question" rows="3" required></textarea>

          <label for="answer">The Answer:</label>
          <textarea id="answer" name="answer" rows="3" required></textarea>

          <label for="tag">Hashtag:</label>
          <input type="text" id="tag" name="tag" placeholder="#css" required />

          <button type="submit" class="btnSubmit" data-js="submit">
            Create Question
          </button>
        </form>
      </section>
    </main>

    <footer class="navBarContainer frosted" data-js="footerContainer"></footer>
  </body>
</html>
