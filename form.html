<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="stylesheet" href="./css/form.css" />
    <link rel="stylesheet" href="./css/home.css" />

    <script src="js/index.js" defer></script>
    <script src="js/showanswer.js" defer></script>
    <script src="js/darkmode.js" defer></script>
    <script src="js/navbar.js" defer></script>
    <script src="js/form.js" defer></script>

  </head>
  <body class="pageForm">
    <header>
      <nav class="site-nav">
        <h2 class="main-title" aria-labelledby="title">Create new Quiz Card</h2>
      </nav>
    </header>



    <main id="formContent" class="formContent">
      <section class="formContainer">

        <article class="newCardForm" data-js="newCardForm">
          
          <form data-js="form">
    <label id="label" for="question">Your Question:</label>
    <textarea id="question" data-js="question" name="question" maxlength="76" required></textarea>
 <small class="character-counter" data-js="question-counter">76 characters left</small>

    <label id="label"  for="answer">The Answer:</label>
    <textarea id="answer" data-js="answer" name="newAnswer" maxlength="150"  required></textarea>
    <small class="character-counter" data-js="question-counter">150 characters left</small>

    <label id="label" for="tag">Hashtag:</label>
    <input type="text" id="tag" data-js="tag" name="tag" placeholder="#css" required />

    <button type="submit" class="btnSubmit" data-js="submit">Create Card</button>
  </form>

          
</article>
     
       
  </form> 
</section>
 
    </main>

  

    <footer class="navBarContainer frosted" data-js="footerContainer"></footer>
  </body>
</html>
